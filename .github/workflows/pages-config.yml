# GitHub Pages 配置文件
# 这个文件用于配置 GitHub Pages 的部署设置

# 部署配置
name: GitHub Pages Deploy

# 触发条件
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 权限设置
permissions:
  contents: read
  pages: write
  id-token: write

# 环境设置
environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

# 工作流
jobs:
  # 构建和部署作业
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 3. 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      # 4. 安装依赖
      - name: Install dependencies
        run: pnpm install

      # 5. 构建文档
      - name: Build documentation
        run: pnpm docs:build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # 6. 配置 Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          path: './docs/.vuepress/dist'

      # 7. 上传构建产物
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/.vuepress/dist'

      # 8. 部署到 Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4