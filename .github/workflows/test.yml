name: Test and Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Test build
        run: pnpm docs:build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Check build output
        run: |
          if [ ! -d "docs/.vuepress/dist" ]; then
            echo "Build output directory does not exist!"
            exit 1
          fi
          if [ ! -f "docs/.vuepress/dist/index.html" ]; then
            echo "Index file does not exist!"
            exit 1
          fi
          echo "Build successful!"

      - name: Lint files (optional)
        run: |
          # 检查是否有明显的语法错误
          find docs/ -name "*.md" -exec sh -c '
            echo "Checking $1"
            if grep -q "<<" "$1" && grep -q ">>" "$1"; then
              echo "Potential merge conflict in $1"
              exit 1
            fi
          ' _ {} \;